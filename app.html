<!DOCTYPE html>
<html>
<head>
  <title>Absent VPN</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#0f172a, #020617);
      color: white;
      overflow: hidden;
    }

    #topMenu {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 20px;
      font-size: 18px;
    }

    .menuItem {
      cursor: pointer;
      opacity: 0.6;
      transition: 0.3s;
    }

    .menuItem.active {
      opacity: 1;
      font-size: 22px;
    }

    #main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 80vh;
      padding: 0 40px;
    }

    .adBox {
      width: 200px;
      height: 300px;
      background: rgba(255,255,255,0.08);
      border: 2px dashed rgba(255,255,255,0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      color: rgba(255,255,255,0.5);
    }

    #pedestal {
      width: 420px;
      height: 380px;
      background: #1e293b;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    #logo {
      width: 200px;
    }

    .panel {
      position: absolute;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    .panel.active {
      display: flex;
      animation: fadeIn 0.4s;
    }

    button {
      padding: 10px 18px;
      background: #2563eb;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* TOGGLES */
    .toggle {
      display: flex;
      justify-content: space-between;
      width: 200px;
      margin: 8px;
    }

    input[type=checkbox] {
      transform: scale(1.3);
    }

    /* PLANS */
    .planBox {
      background: #0f172a;
      padding: 15px;
      border-radius: 10px;
      margin: 10px;
      width: 150px;
    }

    .disabled {
      opacity: 0.5;
    }

    /* GLOBE */
    .globe {
      width: 250px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #3b82f6, #020617);
      position: relative;
    }

    .country {
      position: absolute;
      background: yellow;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
    }

    #usa { top: 110px; left: 70px; }
    #canada { top: 90px; left: 75px; }
    #uk { top: 70px; left: 120px; }
    #germany { top: 80px; left: 140px; }
    #japan { top: 100px; left: 190px; }
    #australia { top: 180px; left: 150px; }

    @keyframes spin {
      from {transform: rotate(0deg);}
      to {transform: rotate(360deg);}
    }

    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }
  </style>
</head>
<body>

<div id="topMenu">
  <div class="menuItem active" onclick="showPanel('connectPanel', this)">Connect</div>
  <div class="menuItem" onclick="showPanel('settingsPanel', this)">Settings</div>
  <div class="menuItem" onclick="showPanel('plansPanel', this)">Plans</div>
</div>

<div id="main">
  <div class="adBox">Ad Here</div>

  <div id="pedestal">

    <!-- LOGO -->
    <div id="logoPanel" class="panel active">
      <img id="logo" src="logo.png">
    </div>

    <!-- CONNECT PANEL -->
    <div id="connectPanel" class="panel">
      <h2 id="statusText">Status: Disconnected</h2>
      <button onclick="openGlobe()">Choose Location</button>
      <button onclick="disconnectVPN()">Disconnect</button>
    </div>

    <!-- GLOBE PANEL -->
    <div id="globePanel" class="panel">
      <h3>Select Location</h3>
      <div class="globe">
        <div id="usa" class="country" onclick="selectCountry('USA')"></div>
        <div id="canada" class="country" onclick="selectCountry('Canada')"></div>
        <div id="uk" class="country" onclick="selectCountry('UK')"></div>
        <div id="germany" class="country" onclick="selectCountry('Germany')"></div>
        <div id="japan" class="country" onclick="selectCountry('Japan')"></div>
        <div id="australia" class="country" onclick="selectCountry('Australia')"></div>
      </div>
      <p id="chosenText"></p>
      <button onclick="connectVPN()">Connect</button>
      <button onclick="backToConnect()">Back</button>
    </div>

    <!-- SETTINGS -->
    <div id="settingsPanel" class="panel">
      <h2>Settings</h2>
      <div class="toggle">Auto Connect <input type="checkbox"></div>
      <div class="toggle">Kill Switch <input type="checkbox"></div>
      <div class="toggle">Block Ads <input type="checkbox"></div>
      <div class="toggle">Dark Mode <input type="checkbox" checked></div>
    </div>

    <!-- PLANS -->
    <div id="plansPanel" class="panel">
      <h2>Plans</h2>
      <div style="display:flex;">
        <div class="planBox disabled">
          <h3>Basic (Current)</h3>
          <p>Free</p>
          <p>Ads</p>
          <p>Limited Servers</p>
          <button disabled>Current</button>
        </div>
        <div class="planBox">
          <h3>Pro</h3>
          <p>$20 / month</p>
          <p>No Ads</p>
          <p>All Servers</p>
          <p>Fast Speeds</p>
          <button>Upgrade</button>
        </div>
      </div>
    </div>

  </div>

  <div class="adBox">Ad Here</div>
</div>

<script>
  let chosenCountry = "";

  function showPanel(panelId, el) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.getElementById(panelId).classList.add("active");

    document.querySelectorAll(".menuItem").forEach(m => m.classList.remove("active"));
    el.classList.add("active");
  }

  function openGlobe() {
    showOnly("globePanel");
  }

  function backToConnect() {
    showOnly("connectPanel");
  }

  function showOnly(id) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function selectCountry(country) {
    chosenCountry = country;
    document.getElementById("chosenText").innerText =
      "Selected: " + country;
  }

  function connectVPN() {
    document.getElementById("chosenText").innerText = "Connecting...";
    setTimeout(() => {
      document.getElementById("statusText").innerText =
        "Status: Connected (" + chosenCountry + ")";
      backToConnect();
    }, 1500);
  }

  function disconnectVPN() {
    document.getElementById("statusText").innerText =
      "Status: Disconnected";
  }
</script>

</body>
</html>
